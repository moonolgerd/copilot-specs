name: Release

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish"
        required: true
        default: both
        type: choice
        options:
          - dry-run
          - marketplace
          - open-vsx
          - both
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest

    outputs:
      base_vsix_name: ${{ steps.meta.outputs.base_vsix_name }}
      kiro_vsix_name: ${{ steps.meta.outputs.kiro_vsix_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Bundle extension
        run: npm run bundle

      - name: Determine package name
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BASE_VSIX_NAME="copilot-specs-${VERSION}.vsix"
          KIRO_VSIX_NAME="kiro-for-copilot-${VERSION}.vsix"
          echo "base_vsix_name=$BASE_VSIX_NAME" >> "$GITHUB_OUTPUT"
          echo "kiro_vsix_name=$KIRO_VSIX_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Copilot Specs VSIX
        run: npx @vscode/vsce package --out "${{ steps.meta.outputs.base_vsix_name }}"

      - name: Build Kiro for Copilot VSIX
        shell: bash
        run: |
          cp package.json package.json.bak
          trap 'mv package.json.bak package.json' EXIT

          node <<'NODE'
          const fs = require("node:fs");
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));

          packageJson.name = "kiro-for-copilot";
          packageJson.displayName = "Kiro for Copilot";

          fs.writeFileSync("package.json", `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

          npx @vscode/vsce package --out "${{ steps.meta.outputs.kiro_vsix_name }}"

      - name: Upload Copilot Specs VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base_vsix_name }}
          path: ${{ steps.meta.outputs.base_vsix_name }}

      - name: Upload Kiro for Copilot VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.kiro_vsix_name }}
          path: ${{ steps.meta.outputs.kiro_vsix_name }}

  publish:
    name: Publish Extension
    needs: package
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Copilot Specs VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.base_vsix_name }}

      - name: Download Kiro for Copilot VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.kiro_vsix_name }}

      - name: Resolve publish target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "publish_target=both" >> "$GITHUB_OUTPUT"
          else
            echo "publish_target=${{ inputs.publish_target }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Copilot Specs to VS Marketplace
        if: (steps.target.outputs.publish_target == 'marketplace' || steps.target.outputs.publish_target == 'both') && env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath "${{ needs.package.outputs.base_vsix_name }}" -p "$VSCE_PAT"

      - name: Publish Copilot Specs to Open VSX
        if: (steps.target.outputs.publish_target == 'open-vsx' || steps.target.outputs.publish_target == 'both') && env.OPEN_VSX_TOKEN != ''
        run: npx --yes ovsx publish "${{ needs.package.outputs.base_vsix_name }}" -p "$OPEN_VSX_TOKEN"

      - name: Publish Kiro for Copilot to VS Marketplace
        if: (steps.target.outputs.publish_target == 'marketplace' || steps.target.outputs.publish_target == 'both') && env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath "${{ needs.package.outputs.kiro_vsix_name }}" -p "$VSCE_PAT"

      - name: Publish Kiro for Copilot to Open VSX
        if: (steps.target.outputs.publish_target == 'open-vsx' || steps.target.outputs.publish_target == 'both') && env.OPEN_VSX_TOKEN != ''
        run: npx --yes ovsx publish "${{ needs.package.outputs.kiro_vsix_name }}" -p "$OPEN_VSX_TOKEN"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "- Copilot Specs VSIX: \`${{ needs.package.outputs.base_vsix_name }}\`"
            echo "- Kiro for Copilot VSIX: \`${{ needs.package.outputs.kiro_vsix_name }}\`"
            echo "- Target: \`${{ steps.target.outputs.publish_target }}\`"
            echo "- Copilot Specs VS Marketplace token configured: \`${{ env.VSCE_PAT != '' }}\`"
            echo "- Copilot Specs Open VSX token configured: \`${{ env.OPEN_VSX_TOKEN != '' }}\`"
            echo "- Kiro for Copilot uses the same Marketplace token: \`${{ env.VSCE_PAT != '' }}\`"
            echo "- Kiro for Copilot uses the same Open VSX token: \`${{ env.OPEN_VSX_TOKEN != '' }}\`"
            echo ""
            echo "If publish was skipped, add matching token(s): \`VSCE_PAT\` for Marketplace and \`OPEN_VSX_TOKEN\` for Open VSX."
          } >> "$GITHUB_STEP_SUMMARY"
